<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FR Café Menu</title>

  <link rel="stylesheet" href="style.css"/>

  <!-- فونت کلاسیک -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
</head>

<body>

  <div class="bg"></div>
  <div class="overlay"></div>

  <div class="container">

    <!-- HEADER با لوگو -->
    <header class="header">

      <img class="logo"
           src="2.png"
           alt="FR Logo">

      <h1>FR Café</h1>
      <p>Digital Menu</p>

    </header>

    <!-- Coffee -->
    <section class="menu-section">
      <h2>Coffee ☕</h2>

      <div class="item"><span>Espresso(اسپرسو)</span><span>110 T</span></div>
      <div class="item"><span>Americano</span><span>100 T</span></div>
      <div class="item"><span>Latte</span><span>120 T</span></div>
      <div class="item"><span>HotChoclate</span><span>150 T</span></div>
    </section>

    <!-- Cold Drinks -->
    <section class="menu-section">
      <h2>Cold Drinks 🧊</h2>

      <div class="item"><span>Iced Coffee</span><span>110 T</span></div>
      <div class="item"><span>Lemonade</span><span>90 T</span></div>
    </section>

    <!-- Desserts -->
    <section class="menu-section">
      <h2>Desserts 🍰</h2>

      <div class="item"><span>Cheesecake</span><span>150 T</span></div>
      <div class="item"><span>Brownie</span><span>130 T</span></div>
    </section>

  </div>

</body>
</html>
